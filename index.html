<!DOCTYPE html>
<html lang="it" data-lang="it" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="ExMnotes — Laboratorio di mente estesa. Note, connessioni, pensiero incarnato." />
  <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f0e8" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ExMnotes" />

  <title>ExMnotes</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/graph.css" />
  <link rel="stylesheet" href="css/transitions.css" />
</head>
<body>

  <div id="app">
    <!-- View area — filled by router -->
    <main id="view" role="main" aria-live="polite"></main>

    <!-- Bottom Navigation Bar — filled by bottomBar component -->
    <nav id="bottom-bar" role="navigation" aria-label="Navigazione principale"></nav>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- Global Modal overlay -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div id="modal-drawer" class="modal-drawer">
      <div class="modal-handle" id="modal-handle"></div>
      <div id="modal-content" class="modal-content"></div>
    </div>
  </div>

  <!-- Settings Panel -->
  <div id="settings-overlay" class="modal-overlay settings-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div id="settings-drawer" class="modal-drawer settings-drawer">
      <div class="modal-handle"></div>
      <div id="settings-content" class="modal-content"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
