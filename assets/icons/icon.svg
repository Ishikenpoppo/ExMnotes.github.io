<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#1a1a2e"/>
  
  <!-- Outer ring pulse -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#7c6af7" stroke-width="3" opacity="0.3"/>
  
  <!-- Graph nodes (Extended Mind topology) -->
  <!-- Central node — the self -->
  <circle cx="256" cy="256" r="36" fill="#7c6af7" opacity="0.9"/>
  <circle cx="256" cy="256" r="22" fill="#a78bfa"/>
  
  <!-- Satellite node — top -->
  <circle cx="256" cy="128" r="22" fill="none" stroke="#34d399" stroke-width="3"/>
  <circle cx="256" cy="128" r="10" fill="#34d399"/>
  
  <!-- Satellite — right -->
  <circle cx="370" cy="200" r="18" fill="none" stroke="#60a5fa" stroke-width="3"/>
  <circle cx="370" cy="200" r="8" fill="#60a5fa"/>
  
  <!-- Satellite — bottom-right -->
  <circle cx="345" cy="340" r="20" fill="none" stroke="#f0a500" stroke-width="3"/>
  <circle cx="345" cy="340" r="9" fill="#f0a500"/>
  
  <!-- Satellite — bottom-left -->
  <circle cx="160" cy="320" r="18" fill="none" stroke="#a78bfa" stroke-width="2"/>"
  <circle cx="160" cy="320" r="8" fill="#a78bfa"/>
  
  <!-- Satellite — left -->
  <circle cx="140" cy="186" r="16" fill="none" stroke="#34d399" stroke-width="2"/>
  <circle cx="140" cy="186" r="7" fill="#34d399"/>
  
  <!-- Edges (connections) -->
  <line x1="256" y1="220" x2="256" y2="150" stroke="#7c6af7" stroke-width="2.5" opacity="0.7"/>
  <line x1="278" y1="240" x2="353" y2="208" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
  <line x1="272" y1="280" x2="328" y2="325" stroke="#f0a500" stroke-width="2" opacity="0.6"/>
  <line x1="230" y1="272" x2="176" y2="310" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
  <line x1="232" y1="244" x2="155" y2="196" stroke="#34d399" stroke-width="2" opacity="0.6"/>
  
  <!-- Cross edge (extended connections) -->
  <line x1="256" y1="128" x2="370" y2="200" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="140" y1="186" x2="345" y2="340" stroke="#f0a500" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3"/>
</svg>
