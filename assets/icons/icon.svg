<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#050510"/>

  <!-- Subtle radial glow -->
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="35%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#bf5af2" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#g1)"/>
  <rect width="512" height="512" rx="112" fill="url(#g2)"/>

  <!-- Outer pulse ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.2"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#bf5af2" stroke-width="1.5" opacity="0.12"/>

  <!-- Edges (neural connections) -->
  <line x1="256" y1="222" x2="256" y2="148" stroke="#00f0ff" stroke-width="2.5" opacity="0.6"/>
  <line x1="280" y1="242" x2="358" y2="204" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
  <line x1="274" y1="280" x2="336" y2="330" stroke="#ffb800" stroke-width="2" opacity="0.5"/>
  <line x1="232" y1="274" x2="172" y2="314" stroke="#bf5af2" stroke-width="2" opacity="0.5"/>
  <line x1="234" y1="244" x2="152" y2="192" stroke="#39ff9f" stroke-width="2" opacity="0.5"/>

  <!-- Cross edges (extended synapses) -->
  <line x1="256" y1="128" x2="370" y2="196" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.3"/>
  <line x1="140" y1="186" x2="345" y2="340" stroke="#ffb800" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.2"/>
  <line x1="160" y1="320" x2="256" y2="128" stroke="#bf5af2" stroke-width="1" stroke-dasharray="4,6" opacity="0.15"/>

  <!-- Central node — neural core -->
  <circle cx="256" cy="256" r="34" fill="#0a0a1e" stroke="#00f0ff" stroke-width="3" opacity="0.9"/>
  <circle cx="256" cy="256" r="20" fill="#00f0ff" opacity="0.85"/>
  <circle cx="256" cy="256" r="20" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="20;28;20" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Satellite — top (Spark / cyan) -->
  <circle cx="256" cy="128" r="20" fill="#0a0a1e" stroke="#00f0ff" stroke-width="2.5"/>
  <circle cx="256" cy="128" r="9" fill="#00f0ff"/>

  <!-- Satellite — right (Synapse / violet) -->
  <circle cx="370" cy="196" r="17" fill="#0a0a1e" stroke="#bf5af2" stroke-width="2.5"/>
  <circle cx="370" cy="196" r="7" fill="#bf5af2"/>

  <!-- Satellite — bottom-right (Network / amber) -->
  <circle cx="345" cy="340" r="19" fill="#0a0a1e" stroke="#ffb800" stroke-width="2.5"/>
  <circle cx="345" cy="340" r="8" fill="#ffb800"/>

  <!-- Satellite — bottom-left (violet) -->
  <circle cx="160" cy="320" r="16" fill="#0a0a1e" stroke="#bf5af2" stroke-width="2"/>
  <circle cx="160" cy="320" r="7" fill="#bf5af2"/>

  <!-- Satellite — left (green) -->
  <circle cx="140" cy="186" r="15" fill="#0a0a1e" stroke="#39ff9f" stroke-width="2"/>
  <circle cx="140" cy="186" r="6" fill="#39ff9f"/>
</svg>
